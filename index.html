<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <script>
      (function() {
        try {
          var savedTheme = localStorage.getItem('travey_theme_v1');
          var isDark = true; // 默认深色
          
          if (savedTheme !== null) {
            isDark = JSON.parse(savedTheme);
          }
          
          // 适配实际色号
          var bgColor = isDark ? '#0f1115' : '#fdfbf7';
          
          // 创建 style 标签
          var style = document.createElement('style');
          style.id = 'travey-theme-style';
          // 这里的 transition: none 很关键，防止初始加载时背景色渐变
          style.innerHTML = 'html, body { background-color: ' + bgColor + ' !important; transition: none !important; }';
          document.head.appendChild(style);
          
          // 创建 meta theme-color
          var metaTheme = document.createElement('meta');
          metaTheme.name = 'theme-color';
          metaTheme.content = bgColor;
          document.head.appendChild(metaTheme);
        } catch (e) {}
      })();
    </script>
    
    <link rel="icon" type="image/svg+xml" href="/Travey/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/Travey/apple-touch-icon.png">
    <title>Travey</title>
    <script type="module" crossorigin src="/Travey/assets/index-DgS__NmO.js"></script>
    <link rel="stylesheet" crossorigin href="/Travey/assets/index-CCAhMiGE.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
